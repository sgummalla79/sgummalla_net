<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Pilot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #111;
    }
    @media (prefers-color-scheme: dark) {
      html, body { background: #0f0f0f; color: #f0f0f0; }
    }
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 0.75rem;
      text-align: center;
      padding: 2rem;
    }
    .hero h1 { font-size: 1.75rem; font-weight: 600; letter-spacing: -0.03em; }
    .hero p  { font-size: 0.95rem; opacity: 0.6; }
    .hero a  { color: inherit; text-underline-offset: 3px; }
  </style>
</head>
<body>
  <div class="hero">
    <h1>AI Pilot</h1>
    <p id="status">Loading&hellip;</p>
  </div>
  <script>
    fetch("/api/auth/chainlit-token", { credentials: "include" })
      .then(function (r) {
        if (!r.ok) {
          document.getElementById("status").innerHTML =
            'Please <a href="/sign-in">sign in</a> to use AI Pilot.';
          return null;
        }
        return r.json();
      })
      .then(function (data) {
        if (!data) return;
        document.getElementById("status").textContent =
          "Powered by GPT-4o — click the chat button to get started.";
        var s = document.createElement("script");
        s.src = "/chainlit-app/copilot/index.js";
        s.onload = function () {
          window.mountChainlitWidget({
            chainlitServer: window.location.origin + "/chainlit-app",
            theme: window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light"
          });
        };
        document.head.appendChild(s);
      });
  </script>
</body>
</html>
